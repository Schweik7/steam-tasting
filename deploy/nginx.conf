# /etc/nginx/conf.d/steam-tasting.conf
# Reverse proxy: 443 (TLS) -> uvicorn on 127.0.0.1:8787 (serves dist + /api).
# Port 80 serves the ACME challenge and redirects everything else to HTTPS.
server {
    listen 80;
    server_name YOUR_DOMAIN;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;
    client_max_body_size 5m;

    ssl_certificate     /etc/nginx/ssl/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/YOUR_DOMAIN/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # /api/report streams Server-Sent Events — disable buffering so chunks
        # reach the browser as they arrive.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
