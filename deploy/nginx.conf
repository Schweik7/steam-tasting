# /etc/nginx/conf.d/steam-tasting.conf
# Reverse proxy: port 80 -> uvicorn on 127.0.0.1:8787 (which serves dist + /api).
server {
    listen 80;
    # IP phase first; switch to the domain later (see deploy/README.md).
    server_name 39.99.245.245;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # /api/report streams Server-Sent Events — disable buffering so chunks
        # reach the browser as they arrive.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
